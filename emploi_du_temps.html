<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<title>Emploi du Temps</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#F7F4FF;
  --paper:#FFFFFE;
  --border:#EDE8F5;
  --muted:#C8C0D8;
  --label:#B0A0CC;
  --title:#2D2550;
  --accent:#6A4FB0;
  --green:#6BBFA0;
  --red:#D97A8A;
  --orange:#E09A5A;
}
html,body{
  height:100%;
  background:linear-gradient(145deg,#F7F4FF 0%,#EDF6F2 50%,#FEF8F0 100%);
  font-family:'Georgia',serif;
  color:var(--title);
  /* Fix: prevent body scroll when keyboard opens */
  overflow-x:hidden;
}
body{padding:20px 14px 100px;}

/* ── PAPER ── */
.paper{
  background:var(--paper);
  border-radius:6px;
  box-shadow:0 2px 6px rgba(80,60,120,.07),0 10px 32px rgba(80,60,120,.11),3px 3px 0 #E8E2F4;
  overflow:hidden;
  max-width:860px;
  margin:0 auto;
  position:relative;
}
.margin-line{
  position:absolute;left:44px;top:0;bottom:0;
  width:1.5px;background:rgba(220,170,170,.35);
  pointer-events:none;z-index:1;
}

/* ── HEADER ── */
.header{padding:22px 16px 18px 56px;border-bottom:2px solid var(--border);}
.sub{color:var(--label);font-size:10px;letter-spacing:2px;text-transform:uppercase;margin-bottom:3px;}
.header h1{font-size:20px;font-weight:700;color:var(--title);line-height:1.2;}
.header .desc{color:#9B8FB0;font-size:11px;margin-top:4px;}
.stats{
  display:flex;
  background:#FAF8FF;
  border:1px solid var(--border);
  border-radius:8px;
  overflow:hidden;
  margin-top:14px;
}
.stat{flex:1;text-align:center;padding:9px 4px;border-right:1px solid var(--border);}
.stat:last-child{border-right:none;}
.stat-n{color:var(--accent);font-weight:700;font-size:17px;}
.stat-l{color:var(--label);font-size:8px;letter-spacing:1px;text-transform:uppercase;}

/* ── ACTIONS ── */
.actions{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap;}
.btn{
  flex:1;min-width:70px;
  border:none;border-radius:6px;
  padding:10px 8px;
  font-size:12px;font-family:'Georgia',serif;font-weight:600;
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:5px;
  transition:opacity .15s,transform .1s;
  -webkit-tap-highlight-color:transparent;
}
.btn:active{transform:scale(.96);}
.btn-save  {background:#6A4FB0;color:#fff;}
.btn-pdf   {background:#E09A5A;color:#fff;}
.btn-img   {background:#6BBFA0;color:#fff;}

/* ── COL HEADERS ── */
.col-headers{
  display:grid;
  grid-template-columns:28px 1fr 1fr 28px;
  gap:8px;
  padding:8px 14px 8px 56px;
  background:#FAFAF8;
  border-bottom:1.5px solid var(--border);
}
.col-headers span{color:var(--label);font-size:9px;letter-spacing:2px;text-transform:uppercase;font-weight:600;}

/* ── ROW ── */
.row{
  display:grid;
  grid-template-columns:28px 1fr 1fr 28px;
  gap:8px;
  padding:12px 14px 12px 56px;
  align-items:center;
  border-bottom:1px solid #F5F2FA;
  cursor:pointer;
  border-left:3px solid transparent;
  transition:background .15s,border-left-color .15s;
  -webkit-tap-highlight-color:transparent;
}
.row:active{background:#FDFBFF;}
.row-num{color:var(--muted);font-size:11px;text-align:center;}
.day-cell{display:flex;align-items:center;gap:6px;}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.day-name{font-weight:700;font-size:12px;}
.time-badge{
  border-radius:3px;padding:2px 7px;
  font-size:11px;font-weight:600;display:inline-block;
}
.subject-text{color:var(--title);font-size:13px;font-weight:600;}
.prof-text{color:#6B5F80;font-size:11px;margin-top:2px;}
.empty-text{color:#D8D0E8;font-size:11px;font-style:italic;}
.del-btn{
  background:transparent;border:none;
  color:transparent;cursor:pointer;font-size:20px;
  width:28px;height:28px;border-radius:4px;
  display:flex;align-items:center;justify-content:center;
  -webkit-tap-highlight-color:transparent;
  transition:color .2s;
}
.row:hover .del-btn{color:var(--red);}
.day-sep{height:1px;background:#F0EBF8;margin:0 14px 0 56px;}

/* ── MODAL OVERLAY — KEY FIX ── */
/* Edit form shown as a fixed bottom sheet so keyboard doesn't push content */
.modal-overlay{
  position:fixed;
  inset:0;
  background:rgba(45,37,80,.45);
  z-index:100;
  display:flex;
  align-items:flex-end;
  justify-content:center;
  opacity:0;
  pointer-events:none;
  transition:opacity .25s;
}
.modal-overlay.open{opacity:1;pointer-events:all;}
.modal-sheet{
  background:var(--paper);
  width:100%;
  max-width:600px;
  border-radius:16px 16px 0 0;
  padding:20px 20px 32px;
  transform:translateY(100%);
  transition:transform .3s cubic-bezier(.4,0,.2,1);
  max-height:90vh;
  overflow-y:auto;
  -webkit-overflow-scrolling:touch;
}
.modal-overlay.open .modal-sheet{transform:translateY(0);}
.modal-handle{
  width:40px;height:4px;border-radius:2px;
  background:#D8D0E8;margin:0 auto 18px;
}
.modal-title{
  color:var(--title);font-size:15px;font-weight:700;
  margin-bottom:16px;
  padding-bottom:12px;
  border-bottom:1.5px solid var(--border);
}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px;}
.form-group{display:flex;flex-direction:column;gap:4px;}
.form-full{grid-column:1/-1;}
.field-label{color:var(--label);font-size:9px;letter-spacing:1.5px;text-transform:uppercase;font-weight:600;}
.field-input,.field-select{
  border:none;
  border-bottom:1.5px solid #D8D0E8;
  background:transparent;
  color:#3D3560;
  font-size:15px;   /* 15px min prevents iOS zoom */
  padding:7px 2px;
  outline:none;
  width:100%;
  font-family:Georgia,serif;
  -webkit-appearance:none;
  border-radius:0;
}
.field-input:focus,.field-select:focus{border-bottom-color:var(--accent);}
.modal-actions{display:flex;gap:8px;margin-top:6px;}
.btn-modal-save{
  flex:1;background:var(--accent);color:#fff;
  border:none;border-radius:8px;
  padding:13px;font-size:14px;font-family:Georgia,serif;font-weight:600;
  cursor:pointer;
}
.btn-modal-cancel{
  flex:0;background:transparent;
  border:1.5px solid var(--border);
  border-radius:8px;color:#9B8FB0;
  padding:13px 16px;font-size:14px;font-family:Georgia,serif;
  cursor:pointer;
}

/* ── ADD FORM ── */
.add-trigger{border-top:1.5px solid var(--border);}
.add-trigger-btn{
  background:transparent;border:none;
  color:var(--muted);cursor:pointer;font-size:13px;
  padding:14px 16px 14px 56px;
  width:100%;text-align:left;
  font-style:italic;font-family:Georgia,serif;
  -webkit-tap-highlight-color:transparent;
}

/* ── FOOTER ── */
.footer{
  padding:12px 16px 12px 56px;
  border-top:1.5px solid var(--border);
  background:#FAFAF8;
  display:flex;justify-content:space-between;align-items:center;
  flex-wrap:wrap;gap:4px;
}
.footer span{color:var(--muted);font-size:10px;font-style:italic;}

/* ── TOAST ── */
.toast{
  position:fixed;bottom:28px;left:50%;
  transform:translateX(-50%) translateY(80px);
  background:#2D2550;color:#fff;
  padding:10px 22px;border-radius:20px;
  font-size:13px;font-family:Georgia,serif;
  box-shadow:0 4px 20px rgba(0,0,0,.2);
  transition:transform .3s ease;
  z-index:999;white-space:nowrap;
}
.toast.show{transform:translateX(-50%) translateY(0);}

/* ── IMAGE EXPORT CANVAS (hidden) ── */
#export-canvas{position:fixed;left:-9999px;top:0;pointer-events:none;}

/* ── NOTEBOOK EXPORT TARGET ── */
#notebook-export{
  display:none;
  font-family:'Georgia',serif;
  background:#FFFFFE;
  width:390px;
  padding:0;
  position:absolute;left:-9999px;top:0;
}

/* ── PRINT ── */
@media print{
  body{background:#fff!important;padding:0!important;}
  .paper{box-shadow:none!important;border-radius:0!important;max-width:100%!important;}
  .no-print{display:none!important;}
  .del-btn{display:none!important;}
  .add-trigger{display:none!important;}
  .footer .hint{display:none!important;}
}

/* ── DESKTOP ── */
@media(min-width:600px){
  body{padding:48px 24px 80px;}
  .header{padding:36px 48px 28px 76px;}
  .margin-line{left:56px;}
  .stats{margin-top:0;}
  .header-row{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;}
  .col-headers{grid-template-columns:36px 110px 130px 1fr 1fr 36px;padding:10px 48px 10px 76px;gap:12px;}
  .row{grid-template-columns:36px 110px 130px 1fr 1fr 36px;padding:13px 48px 13px 76px;gap:12px;}
  .day-sep{margin:0 48px 0 76px;}
  .add-trigger-btn{padding:14px 48px 14px 76px;}
  .footer{padding:14px 48px 14px 76px;}
  .modal-sheet{border-radius:12px;margin-bottom:40px;max-width:520px;}
}

/* ── STICKER ── */
.sticker-wrap {
  display: flex;
  justify-content: flex-end;
  padding: 0 16px 0 0;
  margin-bottom: -18px;
  position: relative;
  z-index: 10;
  pointer-events: none;
}
@media(min-width:600px){
  .sticker-wrap { padding-right: 32px; margin-bottom: -22px; }
}
.sticker {
  pointer-events: all;
  width: 82px;
  height: 82px;
  background: #FFF8DC;
  border-radius: 50%;
  box-shadow:
    0 3px 0 #E8D87A,
    0 5px 12px rgba(180,150,0,.18),
    inset 0 1px 0 rgba(255,255,255,.9);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  transform: rotate(8deg);
  transition: transform .25s cubic-bezier(.34,1.56,.64,1), box-shadow .2s;
  cursor: default;
  user-select: none;
  border: 2px dashed #E8D87A;
  position: relative;
  overflow: hidden;
}
.sticker:hover {
  transform: rotate(-4deg) scale(1.08);
  box-shadow:
    0 4px 0 #E8D87A,
    0 8px 20px rgba(180,150,0,.22),
    inset 0 1px 0 rgba(255,255,255,.9);
}
.sticker::before {
  content: '';
  position: absolute;
  top: 6px; left: 6px; right: 6px; bottom: 6px;
  border-radius: 50%;
  border: 1.5px dashed rgba(210,180,0,.35);
}
.sticker-icon { font-size: 26px; line-height: 1; margin-bottom: 2px; }
.sticker-text {
  font-family: 'Georgia', serif;
  font-size: 8.5px;
  font-weight: 700;
  color: #A08820;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  text-align: center;
  line-height: 1.3;
}
@media print { .sticker-wrap { display: none; } }

</style>
</head>
<body>

<div class="paper" id="main-paper">
  <div class="margin-line"></div>

  <!-- Sticker -->
  <div class="sticker-wrap no-print">
    <div class="sticker" title="Mon emploi du temps ✨">
      <div class="sticker-icon">📅</div>
      <div class="sticker-text">Mon<br>Planning</div>
    </div>
  </div>

  <!-- Header -->
  <div class="header no-print">
    <div class="header-row" id="header-row">
      <div>
        <p class="sub">Université • <span id="year"></span></p>
        <h1 id="main-title" onclick="editTitle()" title="Cliquez pour modifier" style="cursor:pointer;display:inline-flex;align-items:center;gap:8px;">Emploi du Temps <span style="font-size:13px;color:#C8C0D8;font-weight:400;">✎</span></h1>
        <p class="desc">Planning hebdomadaire</p>
      </div>
      <div class="stats">
        <div class="stat"><div class="stat-n" id="stat-s">0</div><div class="stat-l">séances</div></div>
        <div class="stat"><div class="stat-n" id="stat-j">0</div><div class="stat-l">jours</div></div>
        <div class="stat"><div class="stat-n" id="stat-h">0h</div><div class="stat-l">/ sem.</div></div>
      </div>
    </div>
    <div class="actions" style="margin-top:14px">
      <button class="btn btn-pdf"  onclick="exportPDF()">📄 PDF</button>
      <button class="btn btn-img"  onclick="exportImage()">🖼️ Image</button>
    </div>
  </div>

  <!-- Col headers -->
  <div class="col-headers" id="col-headers"></div>

  <!-- Table -->
  <div id="table-body"></div>

  <!-- Add trigger -->
  <div class="add-trigger no-print" id="add-trigger">
    <button class="add-trigger-btn" onclick="showAddModal()">+ Ajouter une séance…</button>
  </div>

  <!-- Footer -->
  <div class="footer">
    <span class="hint">Touchez une ligne pour modifier</span>
    <span style="color:var(--muted);font-size:10px;font-style:italic;">Designed by <strong style="color:var(--accent);">Tardis</strong></span>
    <span id="footer-text"></span>
  </div>
</div>

<!-- Edit / Add Modal Bottom Sheet -->
<div class="modal-overlay no-print" id="modal" onclick="closeModal(event)">
  <div class="modal-sheet" id="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modal-title">Modifier la séance</div>
    <div class="form-grid" id="modal-form"></div>
    <div class="modal-actions">
      <button class="btn-modal-save" id="modal-save-btn">Enregistrer</button>
      <button class="btn-modal-cancel" onclick="closeModalNow()">Annuler</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Hidden notebook for image export -->
<div id="notebook-export"></div>

<script>
const DAY_ORDER=["Lundi","Mardi","Mercredi","Jeudi","Vendredi","Samedi","Dimanche"];
const PAL={
  Lundi:   {dot:"#7C9EE0",tag:"#EEF3FB",text:"#4A6FA5"},
  Mardi:   {dot:"#6BBFA0",tag:"#EBF7F3",text:"#2E8B6A"},
  Mercredi:{dot:"#9B84D4",tag:"#F2EEFA",text:"#6A4FB0"},
  Jeudi:   {dot:"#E09A5A",tag:"#FDF3E8",text:"#B06A22"},
  Vendredi:{dot:"#D97A8A",tag:"#FCEEF1",text:"#A8445A"},
  Samedi:  {dot:"#72B8CE",tag:"#EAF5FA",text:"#2E7E9E"},
  Dimanche:{dot:"#A3BF7A",tag:"#F0F6E8",text:"#5A7E30"},
};
const DEFAULT=[
  {id:1,day:"Lundi",   start:"13H00",end:"14H30",subject:"",professor:""},
  {id:2,day:"Mardi",   start:"15H30",end:"17H00",subject:"",professor:""},
  {id:3,day:"Mercredi",start:"10H00",end:"11H30",subject:"",professor:""},
  {id:4,day:"Mercredi",start:"16H00",end:"17H30",subject:"",professor:""},
  {id:5,day:"Jeudi",   start:"8H30", end:"10H00",subject:"",professor:""},
  {id:6,day:"Jeudi",   start:"14H30",end:"16H00",subject:"",professor:""},
  {id:7,day:"Samedi",  start:"8H30", end:"11H30",subject:"",professor:""},
];
let schedule=JSON.parse(localStorage.getItem("timetable_v3")||"null")||DEFAULT;
let modalMode=null; // 'edit' | 'add'
let modalId=null;
const isMob=()=>window.innerWidth<600;

function toMin(t){const[h,m]=t.replace("H",":").split(":");return parseInt(h)*60+(parseInt(m)||0);}
function totalH(){return(schedule.reduce((a,i)=>a+toMin(i.end)-toMin(i.start),0)/60).toFixed(1);}
function sorted(){return[...schedule].sort((a,b)=>{const d=DAY_ORDER.indexOf(a.day)-DAY_ORDER.indexOf(b.day);return d||a.start.localeCompare(b.start);});}
function toast(msg){const t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");setTimeout(()=>t.classList.remove("show"),2200);}
function saveData(){localStorage.setItem("timetable_v3",JSON.stringify(schedule));toast("✅ Enregistré !");}
function exportPDF(){window.print();}

/* ── STATS ── */
function stats(){
  document.getElementById("stat-s").textContent=schedule.length;
  document.getElementById("stat-j").textContent=[...new Set(schedule.map(i=>i.day))].length;
  document.getElementById("stat-h").textContent=totalH()+"h";
  document.getElementById("footer-text").textContent=schedule.length+" séance"+(schedule.length>1?"s":"")+" · "+totalH()+"h / semaine";
}

/* ── HEADERS ── */
function renderHeaders(){
  const el=document.getElementById("col-headers");
  if(isMob()) el.innerHTML=`<span>N°</span><span>Jour / Matière</span><span>Horaire / Prof.</span><span></span>`;
  else el.innerHTML=`<span>N°</span><span>Jour</span><span>Horaire</span><span>Matière</span><span>Professeur</span><span></span>`;
}

/* ── RENDER TABLE ── */
function render(){
  renderHeaders();
  const s=sorted();
  const body=document.getElementById("table-body");
  body.innerHTML="";
  const mob=isMob();
  s.forEach((item,idx)=>{
    const p=PAL[item.day]||PAL["Lundi"];
    if(idx>0&&s[idx-1].day!==item.day){
      const sep=document.createElement("div");sep.className="day-sep";body.appendChild(sep);
    }
    const div=document.createElement("div");
    div.className="row";
    div.onclick=()=>openEditModal(item.id);
    div.onmouseenter=()=>div.style.borderLeftColor=p.dot;
    div.onmouseleave=()=>div.style.borderLeftColor="transparent";
    if(mob){
      div.innerHTML=`
        <div class="row-num">${idx+1}</div>
        <div>
          <div class="day-cell" style="margin-bottom:3px">
            <div class="dot" style="background:${p.dot}"></div>
            <span class="day-name" style="color:${p.text}">${item.day}</span>
          </div>
          ${item.subject?`<div class="subject-text">${item.subject}</div>`:`<div class="empty-text">— matière —</div>`}
        </div>
        <div>
          <div style="margin-bottom:3px"><span class="time-badge" style="background:${p.tag};color:${p.text}">${item.start}–${item.end}</span></div>
          ${item.professor?`<div class="prof-text">👤 ${item.professor}</div>`:`<div class="empty-text">— prof —</div>`}
        </div>
        <button class="del-btn" onclick="event.stopPropagation();delRow(${item.id})">×</button>`;
    } else {
      div.innerHTML=`
        <div class="row-num">${idx+1}</div>
        <div class="day-cell"><div class="dot" style="background:${p.dot}"></div><span class="day-name" style="color:${p.text}">${item.day}</span></div>
        <div><span class="time-badge" style="background:${p.tag};color:${p.text}">${item.start} – ${item.end}</span></div>
        <div>${item.subject?`<span class="subject-text">${item.subject}</span>`:`<span class="empty-text">—</span>`}</div>
        <div style="display:flex;align-items:center;gap:8px">${item.professor
          ?`<div style="width:26px;height:26px;border-radius:50%;background:${p.tag};color:${p.text};display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0">${item.professor[0].toUpperCase()}</div><span class="prof-text">${item.professor}</span>`
          :`<span class="empty-text">—</span>`}</div>
        <button class="del-btn" onclick="event.stopPropagation();delRow(${item.id})">×</button>`;
    }
    body.appendChild(div);
  });
  stats();
}
function delRow(id){if(confirm("Supprimer cette séance ?")){schedule=schedule.filter(i=>i.id!==id);render();toast("🗑️ Supprimée");}}

/* ── MODAL ── */
function buildForm(data){
  return `
    <div class="form-group"><label class="field-label">Jour</label>
      <select class="field-select" id="m-day">${DAY_ORDER.map(d=>`<option${d===data.day?" selected":""}>${d}</option>`).join("")}</select>
    </div>
    <div class="form-group"><label class="field-label">Début</label>
      <input class="field-input" id="m-start" value="${data.start}" placeholder="8H30" inputmode="text"/>
    </div>
    <div class="form-group"><label class="field-label">Fin</label>
      <input class="field-input" id="m-end" value="${data.end}" placeholder="10H00" inputmode="text"/>
    </div>
    <div class="form-group"><label class="field-label">Matière</label>
      <input class="field-input" id="m-subject" value="${data.subject}" placeholder="ex: Marketing" inputmode="text"/>
    </div>
    <div class="form-group form-full"><label class="field-label">Professeur</label>
      <input class="field-input" id="m-prof" value="${data.professor}" placeholder="Nom du professeur" inputmode="text"/>
    </div>`;
}

function openEditModal(id){
  const item=schedule.find(i=>i.id===id);
  if(!item)return;
  modalMode="edit";modalId=id;
  document.getElementById("modal-title").textContent="Modifier la séance";
  document.getElementById("modal-form").innerHTML=buildForm(item);
  document.getElementById("modal-save-btn").onclick=submitEdit;
  document.getElementById("modal").classList.add("open");
}
function showAddModal(){
  modalMode="add";modalId=null;
  document.getElementById("modal-title").textContent="Nouvelle séance";
  document.getElementById("modal-form").innerHTML=buildForm({day:"Lundi",start:"",end:"",subject:"",professor:""});
  document.getElementById("modal-save-btn").onclick=submitAdd;
  document.getElementById("modal").classList.add("open");
}
function closeModal(e){if(e.target.id==="modal")closeModalNow();}
function closeModalNow(){document.getElementById("modal").classList.remove("open");}

function getFormData(){
  return{
    day:document.getElementById("m-day").value,
    start:document.getElementById("m-start").value.trim(),
    end:document.getElementById("m-end").value.trim(),
    subject:document.getElementById("m-subject").value.trim(),
    professor:document.getElementById("m-prof").value.trim(),
  };
}
function submitEdit(){
  const d=getFormData();
  schedule=schedule.map(i=>i.id===modalId?{...i,...d}:i);
  closeModalNow();render();toast("✏️ Modifiée");
}
function submitAdd(){
  const d=getFormData();
  if(!d.start||!d.end){alert("Veuillez saisir début et fin.");return;}
  schedule.push({...d,id:Date.now()});
  closeModalNow();render();toast("✅ Ajoutée");
}

/* ── IMAGE EXPORT — LANDSCAPE NOTEBOOK ── */

  const s=sorted();

  });

  <div style="position:absolute;inset:0;background-image:repeating-linear-gradient(transparent,transparent 37px,#E8EEF8 37px,#E8EEF8 38px);background-size:100% 38px;opacity:.4;pointer-events:none;"></div>

  <div style="display:flex;align-items:stretch;border-bottom:2px solid #EDE8F5;background:linear-gradient(135deg,#FAF8FF 0%,#F4F8F4 100%);position:relative;">
    <div style="padding:26px 32px 26px 78px;flex:1;">
      <p style="color:#B0A0CC;font-size:9px;letter-spacing:3px;text-transform:uppercase;margin-bottom:5px;font-family:Georgia,serif;">UNIVERSITÉ • ${new Date().getFullYear()}</p>

      <p style="color:#9B8FB0;font-size:12px;font-family:Georgia,serif;">Planning hebdomadaire — Semestre en cours</p>
    </div>
    <div style="display:flex;align-items:center;border-left:1.5px solid #EDE8F5;">
      ${[{n:schedule.length,l:"séances"},{n:[...new Set(schedule.map(i=>i.day))].length,l:"jours"},{n:totalH()+"h",l:"/ semaine"}].map((st,i)=>`
      <div style="text-align:center;padding:22px 32px;border-right:${i<2?"1px solid #EDE8F5":"none"};">
        <div style="color:#6A4FB0;font-weight:700;font-size:24px;font-family:Georgia,serif;">${st.n}</div>
        <div style="color:#B0A0CC;font-size:9px;letter-spacing:1px;text-transform:uppercase;margin-top:3px;font-family:Georgia,serif;">${st.l}</div>
      </div>`).join("")}
    </div>
  </div>
  <div style="display:grid;grid-template-columns:40px 120px 130px 1fr 1fr;padding:10px 32px 10px 78px;background:#FAFAF8;border-bottom:1.5px solid #EDE8F5;">
    <span style="color:#B0A0CC;font-size:9px;letter-spacing:2px;text-transform:uppercase;font-weight:600;text-align:center;font-family:Georgia,serif;">N°</span>
    <span style="color:#B0A0CC;font-size:9px;letter-spacing:2px;text-transform:uppercase;font-weight:600;font-family:Georgia,serif;">Jour</span>
    <span style="color:#B0A0CC;font-size:9px;letter-spacing:2px;text-transform:uppercase;font-weight:600;font-family:Georgia,serif;">Horaire</span>
    <span style="color:#B0A0CC;font-size:9px;letter-spacing:2px;text-transform:uppercase;font-weight:600;font-family:Georgia,serif;">Matière</span>
    <span style="color:#B0A0CC;font-size:9px;letter-spacing:2px;text-transform:uppercase;font-weight:600;font-family:Georgia,serif;">Professeur</span>
  </div>`;

  s.forEach((item,idx)=>{
    const p=PAL[item.day]||PAL["Lundi"];
    const isNewDay=idx>0&&s[idx-1].day!==item.day;
    if(isNewDay) html+=`<div style="height:1px;background:#F0EBF8;margin:0 32px 0 78px;"></div>`;
    const bg=idx%2===0?"transparent":"rgba(248,246,255,.5)";
    html+=`
    <div style="display:grid;grid-template-columns:40px 120px 130px 1fr 1fr;padding:14px 32px 14px 78px;border-bottom:1px solid #F5F2FA;align-items:center;min-height:50px;background:${bg};">
      <div style="color:#D0C8E0;font-size:11px;text-align:center;font-family:Georgia,serif;">${idx+1}</div>
      <div style="display:flex;align-items:center;gap:7px;">
        <div style="width:8px;height:8px;border-radius:50%;background:${p.dot};flex-shrink:0;"></div>
        <span style="font-weight:700;font-size:13px;color:${p.text};font-family:Georgia,serif;white-space:nowrap;">${item.day}</span>
      </div>

      </div>
      <div>
        <span style="color:#2D2550;font-size:14px;font-weight:600;font-family:Georgia,serif;">${item.subject||"—"}</span>
      </div>
      <div style="display:flex;align-items:center;gap:8px;padding-left:16px;">
        ${item.professor
          ?`<div style="width:26px;height:26px;border-radius:50%;background:${p.tag};color:${p.text};display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;font-family:Georgia,serif;">${item.professor[0].toUpperCase()}</div>
             <span style="color:#6B5F80;font-size:13px;font-family:Georgia,serif;">${item.professor}</span>`
          :`<span style="color:#D8D0E8;font-size:13px;font-style:italic;font-family:Georgia,serif;">—</span>`}
      </div>
    </div>`;
  });

  html+=`
  <div style="padding:13px 32px 13px 78px;background:#FAFAF8;border-top:1.5px solid #EDE8F5;display:flex;justify-content:space-between;align-items:center;">
    <span style="color:#C8C0D8;font-size:10px;font-style:italic;font-family:Georgia,serif;">Emploi du temps</span>
    <span style="color:#C8C0D8;font-size:10px;font-family:Georgia,serif;">${schedule.length} séances · ${totalH()}h / semaine</span>
  </div>
  </div>`;

  nb.innerHTML=html;
  await new Promise(r=>setTimeout(r,150));

  try{
    const canvas=await html2canvas(nb.firstElementChild,{
      scale:2.5, useCORS:true, backgroundColor:"#FFFFFE", logging:false,
    });
    const link=document.createElement("a");
    link.download="emploi_du_temps.png";
    link.href=canvas.toDataURL("image/png");
    link.click();
    toast("🖼️ Image enregistrée !");
  }catch(e){
    toast("❌ Erreur export");
    console.error(e);
  }
  nb.style.display="none";
}

/* ── EDIT TITLE ── */
function editTitle(){
  const el=document.getElementById("main-title");
  const current=el.dataset.value||"Emploi du Temps";
  const input=document.createElement("input");
  Object.assign(input.style,{
    border:"none", borderBottom:"2px solid #6A4FB0",
    background:"transparent", color:"#2D2550",
    fontSize:"20px", fontFamily:"Georgia,serif", fontWeight:"700",
    outline:"none", width:"260px", padding:"2px 0",
  });
  input.value=current;
  el.innerHTML="";
  el.appendChild(input);
  input.focus();
  input.select();
  const done=()=>{
    const val=input.value.trim()||"Emploi du Temps";
    el.dataset.value=val;
    el.innerHTML=val+' <span style="font-size:13px;color:#C8C0D8;font-weight:400;">✎</span>';
    document.title=val;
  };
  input.addEventListener("blur",done);
  input.addEventListener("keydown",e=>{if(e.key==="Enter")input.blur();if(e.key==="Escape"){input.value=current;input.blur();}});
}
